<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPARK Self-Care Self-Assessment</title>
  <style>
    .sp-wrap { padding: 1rem 0; font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; gap: 1.25rem; }
    .summary-card { width: 100%; max-width: 640px; background: #f5f5f3; border: 0.5px solid rgba(0,0,0,0.15); border-radius: 12px; padding: 16px 20px; box-sizing: border-box; }
    .summary-top { position: relative; text-align: center; margin-bottom: 10px; padding: 4px 0; }
    .summary-avg-label { font-size: 12px; color: #555555; margin-bottom: 4px; }
    .summary-avg { font-size: 36px; font-weight: 500; color: #1a1a1a; }
    .reset-btn { position: absolute; right: 0; top: 50%; transform: translateY(-50%); font-size: 12px; padding: 6px 14px; cursor: pointer; color: #555555; background: transparent; border: 0.5px solid rgba(0,0,0,0.3); border-radius: 8px; }
    .reset-btn:hover { background: #f0f0ec; }
    .reset-btn:focus-visible { outline: 2px solid #1a7abf; outline-offset: 2px; }
    .summary-msg { font-size: 12px; color: #555555; line-height: 1.6; margin: 0 0 12px; }
    .scores-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .scores-table th { text-align: left; font-weight: 500; color: #555555; padding: 4px 0; border-bottom: 0.5px solid rgba(0,0,0,0.15); }
    .scores-table th.th-score { text-align: right; width: 52px; }
    .scores-table th.th-slider { padding-left: 12px; }
    .scores-table td { padding: 9px 0; border-bottom: 0.5px solid rgba(0,0,0,0.15); vertical-align: middle; }
    .scores-table tr:last-child td { border-bottom: none; }
    .td-name { width: 185px; padding-right: 10px; color: #1a1a1a; font-size: 12px; line-height: 1.4; }
    .td-slider { padding-left: 12px; }
    .td-score { width: 52px; text-align: right; font-weight: 500; color: #1a1a1a; font-size: 13px; padding-left: 10px; }
    .styled-slider { -webkit-appearance: none; appearance: none; width: 100%; height: 20px; border-radius: 10px; outline: none; cursor: pointer; border: none; }
    .styled-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 28px; height: 28px; border-radius: 50%; background: var(--sp-thumb, #888888); border: 3px solid #fff; box-shadow: 0 0 0 1.5px var(--sp-thumb, #888888); cursor: pointer; }
    .styled-slider::-moz-range-thumb { width: 28px; height: 28px; border-radius: 50%; background: var(--sp-thumb, #888888); border: 3px solid #fff; box-shadow: 0 0 0 1.5px var(--sp-thumb, #888888); cursor: pointer; }
    .styled-slider:focus-visible { outline: 2px solid #1a7abf; outline-offset: 3px; border-radius: 10px; }
    .section-head { font-size: 11px; font-weight: 500; color: #777777; text-transform: uppercase; letter-spacing: 0.06em; width: 100%; max-width: 640px; margin-bottom: -6px; }
    .sp-sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
  </style>
</head>
<body>

<div class="sp-wrap" role="main">
  <h2 class="sp-sr-only">SPARK self-care self-assessment tool</h2>

  <p class="section-head" aria-hidden="true">Rate your self-care in each domain (1 = weak, 10 = strong)</p>

  <div class="summary-card" role="region" aria-labelledby="sp-summary-heading" aria-live="polite" aria-atomic="false">
    <div class="summary-top">
      <div class="summary-avg-label" id="sp-summary-heading">My SPARK Score</div>
      <div class="summary-avg" id="sp-avg-out" aria-label="My SPARK Score: 5.0 out of 10">5.0</div>
      <button class="reset-btn" onclick="spResetAll()" aria-label="Reset all domain scores to 5">Reset</button>
    </div>
    <p class="summary-msg" id="sp-sum-msg" role="status" aria-live="polite">Adjust the sliders below to see your self-care profile.</p>

    <table class="scores-table" aria-label="Self-care domain ratings">
      <thead>
        <tr>
          <th scope="col">Domain</th>
          <th scope="col" class="th-slider">Rating (drag to adjust)</th>
          <th scope="col" class="th-score">Score</th>
        </tr>
      </thead>
      <tbody id="sp-scores-tbody"></tbody>
    </table>
  </div>
</div>

<script>
(function() {
  var spDomains = [
    { label: "Work (support & environment)", color: "#e97c61" },
    { label: "Work (conditions)",            color: "#ee8959" },
    { label: "Sleep",                        color: "#f4a261" },
    { label: "Technology",                   color: "#efb366" },
    { label: "Emotional / Psychological",    color: "#e9c46a" },
    { label: "Support Networks",             color: "#8ab17d" },
    { label: "Physical & Mental Health",     color: "#2a9d8f" },
    { label: "Spirituality",                 color: "#287271" },
    { label: "Leisure & Relaxation",         color: "#264653" },
    { label: "Compassion & Kindness",        color: "#985277" },
  ];

  var N = spDomains.length;
  var spValues = new Array(N).fill(5);
  var tbody = document.getElementById('sp-scores-tbody');

  function hexToRgb(hex) {
    var r = parseInt(hex.slice(1,3),16);
    var g = parseInt(hex.slice(3,5),16);
    var b = parseInt(hex.slice(5,7),16);
    return [r,g,b];
  }

  function trackBg(color, pct) {
    var rgb = hexToRgb(color);
    var lightR = Math.round(rgb[0]+(240-rgb[0])*0.7);
    var lightG = Math.round(rgb[1]+(240-rgb[1])*0.7);
    var lightB = Math.round(rgb[2]+(240-rgb[2])*0.7);
    var light = 'rgb('+lightR+','+lightG+','+lightB+')';
    return 'linear-gradient(to right,'+color+' 0%,'+color+' '+pct+'%,'+light+' '+pct+'%,'+light+' 100%)';
  }

  spDomains.forEach(function(d, i) {
    var tr = document.createElement('tr');
    tr.innerHTML =
      '<td class="td-name">'+d.label+'</td>'+
      '<td class="td-slider">'+
        '<input class="styled-slider" type="range" id="sp-slider-'+i+'" min="1" max="10" step="1" value="5"'+
        ' data-i="'+i+'"'+
        ' aria-label="'+d.label+' self-care rating"'+
        ' aria-valuemin="1" aria-valuemax="10" aria-valuenow="5"'+
        ' aria-valuetext="5 out of 10 \u2014 '+d.label+'"'+
        ' style="--sp-thumb:'+d.color+';"'+
        ' oninput="spOnSlide(this)">'+
      '</td>'+
      '<td class="td-score"><span id="sp-score-'+i+'" aria-label="'+d.label+': 5 out of 10">5<span style="font-size:10px;font-weight:400;color:#777;"> /10</span></span></td>';
    tbody.appendChild(tr);
    document.getElementById('sp-slider-'+i).style.background = trackBg(d.color, 50);
  });

  window.spOnSlide = function(el) {
    var i   = parseInt(el.dataset.i);
    var v   = parseInt(el.value);
    var pct = (v - 1) / 9 * 100;
    spValues[i] = v;
    el.setAttribute('aria-valuenow', v);
    el.setAttribute('aria-valuetext', v + ' out of 10 \u2014 ' + spDomains[i].label);
    el.style.background = trackBg(spDomains[i].color, pct);
    var scoreEl = document.getElementById('sp-score-' + i);
    scoreEl.innerHTML = v + '<span style="font-size:10px;font-weight:400;color:#777;"> /10</span>';
    scoreEl.setAttribute('aria-label', spDomains[i].label + ': ' + v + ' out of 10');
    spUpdateSummary();
  };

  function spUpdateSummary() {
    var avg = spValues.reduce(function(a,b){return a+b;},0) / N;
    var rounded = avg.toFixed(1);
    var avgEl = document.getElementById('sp-avg-out');
    avgEl.textContent = rounded;
    avgEl.setAttribute('aria-label', 'My SPARK Score: ' + rounded + ' out of 10');
    var msg = avg < 4
      ? "Your ratings suggest you may be running low. Small, consistent steps make a real difference."
      : avg < 7
      ? "You are managing in several areas. Notice where your energy goes and where support might help."
      : "Strong overall self-care. Keep nurturing the areas that sustain you.";
    document.getElementById('sp-sum-msg').textContent = msg;
  }

  window.spResetAll = function() {
    spValues.fill(5);
    spDomains.forEach(function(d, i) {
      var el = document.getElementById('sp-slider-' + i);
      el.value = 5;
      el.setAttribute('aria-valuenow', 5);
      el.setAttribute('aria-valuetext', '5 out of 10 \u2014 ' + d.label);
      el.style.background = trackBg(d.color, 50);
      var scoreEl = document.getElementById('sp-score-' + i);
      scoreEl.innerHTML = '5<span style="font-size:10px;font-weight:400;color:#777;"> /10</span>';
      scoreEl.setAttribute('aria-label', d.label + ': 5 out of 10');
    });
    spUpdateSummary();
  };

  spUpdateSummary();
})();
</script>

</body>
</html>
